baseURL = 'https://karthikpillai77.github.io/'
languageCode = 'en-us'
title = 'Karthik Pillai | Blog'
theme = 'hugo-theme-stack'

[params]
    locale = "en"
    mainSections = ["posts"]

[params.colorScheme]
    default = "dark" 
    toggle = false    

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2
  [[menu.main]]
    name = "Write up"
    url = "/posts/"
    weight = 3
  

[markup]
  [markup.goldmark.renderer]
    unsafe = true

[params.custom]
    css = ["scss/custom.scss"]